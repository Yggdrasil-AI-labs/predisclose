name: predisclose

# Scan the repo on every push / PR. Findings surface four ways:
#   - exit code (the gating step fails the job)
#   - SARIF in the repo's Security tab (needs security-events: write)
#   - a Markdown table on the run's Summary page (GITHUB_STEP_SUMMARY)
#   - a sticky comment on pull requests (needs pull-requests: write)
# To scan with private org patterns in CI, store the rules JSON as a secret and
# write it to .predisclose.local.json in a prior step (do NOT commit it).
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # upload SARIF to code scanning
  pull-requests: write    # post the findings comment on PRs

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history (lets you run `predisclose scan --history`)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install predisclose
        run: pip install .
      - name: Materialize private rules (optional)
        if: ${{ env.PREDISCLOSE_RULES_JSON != '' }}
        env:
          PREDISCLOSE_RULES_JSON: ${{ secrets.PREDISCLOSE_RULES_JSON }}
        run: printf '%s' "$PREDISCLOSE_RULES_JSON" > .predisclose.local.json

      - name: Generate SARIF report
        continue-on-error: true  # reporting steps never gate; the scan step below does
        run: predisclose scan . --format sarif > predisclose.sarif
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: predisclose.sarif

      - name: Generate Markdown summary
        if: always()
        continue-on-error: true
        run: predisclose scan . --format md > predisclose.md
      - name: Write job summary
        if: always()
        run: cat predisclose.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment findings on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- predisclose-report -->';
            const body = marker + '\n' + fs.readFileSync('predisclose.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Optional: push a chat alert when findings block. Add a PREDISCLOSE_WEBHOOK
      # repository secret (Slack/Discord/generic incoming webhook) to enable.
      # - name: Notify webhook
      #   if: ${{ always() && env.PREDISCLOSE_WEBHOOK != '' }}
      #   env:
      #     PREDISCLOSE_WEBHOOK: ${{ secrets.PREDISCLOSE_WEBHOOK }}
      #     PREDISCLOSE_WEBHOOK_STYLE: slack
      #   run: predisclose scan . --fail-on medium --notify-webhook "$PREDISCLOSE_WEBHOOK" || true

      - name: Fail on findings at/above threshold
        run: predisclose scan . --fail-on medium
