name: release

# On a version tag, build the single-file predisclose.pyz and attach it to the
# GitHub Release so it can be downloaded/curled without a pip install.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pyz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build single-file predisclose.pyz
        run: python scripts/build_pyz.py -o predisclose.pyz
      - name: Smoke-test the artifact gates correctly
        run: |
          python predisclose.pyz --version
          # Assemble a synthetic AWS doc key at runtime so this workflow file
          # carries no scannable secret shape of its own.
          key="AKIA$(printf %s IOSFODNN7EXAMPLE)"
          mkdir -p _smoke && printf "k = %s\n" "$key" > _smoke/x.txt
          # scan must exit nonzero on findings, else the gate is silently broken
          if python predisclose.pyz scan _smoke; then
            echo "FAIL: archive exited 0 on findings (gate broken)"; exit 1
          fi
          rm -rf _smoke
      - name: Attach the artifact to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            && gh release upload "$GITHUB_REF_NAME" predisclose.pyz --clobber \
            || gh release create "$GITHUB_REF_NAME" predisclose.pyz \
                 --title "$GITHUB_REF_NAME" --generate-notes
